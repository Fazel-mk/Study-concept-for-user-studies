<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Study Results</title>
  <style>
    body {
      font-family: -apple-system, Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      color: #222;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    h2 { font-size: 16px; margin: 26px 0 6px; }
    .meta { color: #555; font-size: 13px; margin-bottom: 16px; }
    .bar {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 18px;
    }
    button {
      background: #2e6fb7; color: #fff; border: none; padding: 9px 14px;
      border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 8px;
    }
    button.secondary { background: #6c757d; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 6px; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    th { background: #f0f4f8; }
    td.num { text-align: center; }
    .ok { color: #1e8449; font-weight: bold; }
    .no { color: #c0392b; font-weight: bold; }
    .skip { color: #b06a00; font-weight: bold; }
    .exsum { font-size: 13px; color: #444; margin-top: 4px; }
    .empty { color: #888; font-style: italic; }
    .notice {
      background: #fff8e1; border-left: 4px solid #e0a800;
      padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;
    }
    .totals { background: #eef4fb; border-left: 4px solid #2e6fb7;
      padding: 10px 14px; border-radius: 6px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>My Study Results</h1>
  <div class="meta" id="meta"></div>

  <div class="bar">
    <button id="csvBtn">Download study data (CSV)</button>
    <button id="backBtn" class="secondary">Back to the study</button>
  </div>

  <div id="content"></div>

  <script>
    var TOTAL_EXERCISES = 8;

    var EXERCISE_NAMES = {
      "addition_exercise.html": "Addition",
      "subtraction_exercise.html": "Subtraction",
      "multiplication_Exercise.html": "Multiplication",
      "division_exercise.html": "Division",
      "linear_exercise.html": "Linear equations",
      "quadratic_exercise.html": "Quadratic equations",
      "deri_exercise1.html": "Derivatives 1",
      "deri_exercise2.html": "Derivatives 2"
    };

    function readLog() {
      try { return JSON.parse(localStorage.getItem("studyLog") || "[]"); }
      catch (e) { return []; }
    }

    function isTrue(v) { return v === true || v === "true"; }
    function isMarker(r) { return String(r.questionId || "").indexOf("__") === 0; }
    function isSkip(r) { return String(r.selectedValue || "").toUpperCase() === "SKIPPED"; }

    var log = readLog();
    var params = new URLSearchParams(window.location.search);
    var group = localStorage.getItem("studyGroup") || "";
    var pid = localStorage.getItem("studyParticipantId") || "(unknown)";

    // How many exercises were completed?
    var completed = {};
    log.forEach(function (r) {
      if (r.questionId === "__exercise_complete__") completed[r.page] = true;
    });
    var completedCount = Object.keys(completed).length;

    // Never reveal correctness to the no-feedback group mid-study, or their
    // remaining answers would be influenced. Reveal only once they are done
    // (or when the researcher passes ?full=1).
    var reveal = group !== "nofeedback" ||
                 completedCount >= TOTAL_EXERCISES ||
                 params.get("full") === "1";

    document.getElementById("meta").textContent =
      "Participant " + pid + "  |  group: " + (group || "not assigned") +
      "  |  exercises completed: " + completedCount + " of " + TOTAL_EXERCISES;

    function esc(s) {
      return String(s === undefined || s === null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function render() {
      var content = document.getElementById("content");

      var attempts = log.filter(function (r) { return !isMarker(r); });
      if (attempts.length === 0) {
        content.innerHTML = '<p class="empty">No answers recorded yet on this device.</p>';
        return;
      }

      var html = "";

      if (!reveal) {
        html += '<div class="notice">Your answers are recorded below. ' +
                'Whether they were right or wrong is shown once you have finished ' +
                'all ' + TOTAL_EXERCISES + ' exercises.</div>';
      }

      // Group attempts by exercise page, keeping the order they were attempted.
      var order = [];
      var byPage = {};
      attempts.forEach(function (r) {
        var pg = r.page || "(unknown)";
        if (!byPage[pg]) { byPage[pg] = []; order.push(pg); }
        byPage[pg].push(r);
      });

      var grandAnswered = 0, grandCorrect = 0, grandSkipped = 0;

      order.forEach(function (pg) {
        var rows = byPage[pg];
        var name = EXERCISE_NAMES[pg] || pg;

        var answered = 0, correctFirst = 0, skipped = 0;
        rows.forEach(function (r) {
          if (isSkip(r)) { skipped++; return; }
          if (isTrue(r.isFirstAttempt)) {
            answered++;
            if (isTrue(r.isCorrect)) correctFirst++;
          }
        });
        grandAnswered += answered;
        grandCorrect += correctFirst;
        grandSkipped += skipped;

        html += "<h2>" + esc(name) + "</h2>";

        html += "<table><tr>" +
          "<th>Question</th><th>Attempt</th><th>Your answer</th>" +
          (reveal ? "<th>Correct answer</th><th>Result</th>" : "") +
          "<th>Time (s)</th></tr>";

        rows.forEach(function (r) {
          var result, yours;
          if (isSkip(r)) {
            yours = '<span class="skip">skipped</span>';
            result = '<span class="skip">Skipped</span>';
          } else {
            yours = esc(r.selectedValue);
            result = isTrue(r.isCorrect)
              ? '<span class="ok">Correct</span>'
              : '<span class="no">Wrong</span>';
          }
          html += "<tr>" +
            "<td>" + esc(r.questionId) + "</td>" +
            '<td class="num">' + esc(r.attemptNumber || "-") + "</td>" +
            "<td>" + yours + "</td>" +
            (reveal ? "<td>" + (isSkip(r) ? "-" : esc(r.correctValue)) + "</td><td>" + result + "</td>" : "") +
            '<td class="num">' + esc(r.secondsSinceStart) + "</td>" +
            "</tr>";
        });
        html += "</table>";

        html += '<div class="exsum">Answered: ' + answered +
                ", skipped: " + skipped +
                (reveal ? ", correct on first attempt: " + correctFirst + " of " + answered : "") +
                "</div>";
      });

      var pct = grandAnswered ? (grandCorrect / grandAnswered * 100).toFixed(1) : "0.0";
      html += '<h2>Overall</h2><div class="totals">' +
        "Exercises attempted: " + order.length +
        " &nbsp;|&nbsp; questions answered: " + grandAnswered +
        " &nbsp;|&nbsp; skipped: " + grandSkipped +
        (reveal ? " &nbsp;|&nbsp; first-attempt accuracy: " + grandCorrect +
                  "/" + grandAnswered + " (" + pct + "%)" : "") +
        "</div>";

      content.innerHTML = html;
    }

    // ---- CSV export (same columns as the in-exercise export) ----
    function csvEscape(v) {
      if (v === null || v === undefined) return "";
      var s = String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }

    document.getElementById("csvBtn").addEventListener("click", function () {
      var headers = ["participantId","group","page","questionId","attemptNumber",
        "selectedValue","correctValue","isCorrect","isFirstAttempt",
        "secondsSinceStart","timestamp"];
      var lines = [headers.join(",")];
      log.forEach(function (e) {
        lines.push(headers.map(function (h) { return csvEscape(e[h]); }).join(","));
      });
      var blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "study_" + pid + "_" + (group || "data") + ".csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    document.getElementById("backBtn").addEventListener("click", function () {
      window.location.href = "index.html";
    });

    render();
  </script>
</body>
</html>
